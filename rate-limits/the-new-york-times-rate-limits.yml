specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: The New York Times
providerId: the-new-york-times
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - News
  - Media
description: >-
  The New York Times Developer Network historically enforced per-app daily quotas and a small per-second
  limit per registered app, with quotas managed via the developer portal. The developer.nytimes.com FAQ
  was not reachable from this environment at reconciliation time, so specific current numbers are not
  transcribed here.
sources:
  - https://developer.nytimes.com/
  - https://developer.nytimes.com/faq
notes: >-
  developer.nytimes.com was blocked at reconciliation time. Specific per-second / per-day numbers must
  be re-verified against the live FAQ before any consumer relies on this artifact.
responseCodes:
  throttled: 429
limits:
  - name: Per-App Quota
    scope: app
    metric: varies
    limit: see https://developer.nytimes.com/faq
policies:
  - name: Per-App Throttling
    description: Limits are enforced per registered NYT Developer app key; exhausting the daily quota
      returns 429 until the next rollover.
  - name: Quota Increase
    description: Higher limits, including any commercial use, are arranged via the NYT Developer Network
      contact channels rather than self-serve.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
