naftiko: "1.0.0-alpha1"

info:
  label: "NYT Movie Reviews API"
  description: "Access NYT movie reviews, critics' picks, and reviewer profiles. Search reviews by keyword, opening date, or publication date."
  tags:
    - New York Times
    - Movies
    - Reviews
    - Critics
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      NYT_API_KEY: NYT_API_KEY

capability:
  consumes:
    - type: http
      namespace: nyt-movie-reviews
      baseUri: https://api.nytimes.com/svc/movies/v2
      description: "NYT Movie Reviews API providing access to reviews, critics, and critics' picks."
      authentication:
        type: apikey
        key: api-key
        value: "{{NYT_API_KEY}}"
        placement: query
      resources:
        - name: critics
          path: /critics/{reviewer}.json
          description: "Get movie critic profiles by reviewer name or category."
          operations:
            - name: get-movie-critics
              method: GET
              description: "Get movie critic profiles including name, bio, and image."
              inputParameters:
                - name: reviewer
                  in: path
                  type: string
                  required: true
                  description: "Reviewer name, or 'all', 'full-time', or 'part-time'."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reviews
          path: /reviews/{type}.json
          description: "Get movie reviews filtered by critics' pick status."
          operations:
            - name: get-movie-reviews
              method: GET
              description: "Get movie reviews, optionally filtered to Critics' Picks."
              inputParameters:
                - name: type
                  in: path
                  type: string
                  required: true
                  description: "Filter type: 'all' for all reviews, 'picks' for Critics' Picks."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Starting point of results (multiple of 20)."
                - name: order
                  in: query
                  type: string
                  required: false
                  description: "Sort order: by-opening-date or by-publication-date."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reviews-search
          path: /reviews/search.json
          description: "Search for movie reviews by keyword, date ranges, or reviewer."
          operations:
            - name: search-movie-reviews
              method: GET
              description: "Search movie reviews by keyword, opening date, publication date, or reviewer."
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search keyword (e.g. lebowski)."
                - name: critics-pick
                  in: query
                  type: string
                  required: false
                  description: "Set to Y to only show critics' picks."
                - name: reviewer
                  in: query
                  type: string
                  required: false
                  description: "Filter by reviewer byline."
                - name: opening-date
                  in: query
                  type: string
                  required: false
                  description: "US opening date range (e.g. 1930-01-01:1940-01-01)."
                - name: publication-date
                  in: query
                  type: string
                  required: false
                  description: "Review publication date range."
                - name: order
                  in: query
                  type: string
                  required: false
                  description: "Sort by by-opening-date or by-publication-date."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8124
      namespace: nyt-movie-reviews-api
      resources:
        - path: /v1/critics/{reviewer}
          name: critics
          description: "NYT movie critic profiles."
          operations:
            - method: GET
              name: get-movie-critics
              description: "Get NYT movie critic profiles."
              call: "nyt-movie-reviews.get-movie-critics"
              with:
                reviewer: "rest.reviewer"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/movie-reviews
          name: reviews
          description: "NYT movie reviews."
          operations:
            - method: GET
              name: get-movie-reviews
              description: "Get NYT movie reviews with optional Critics' Pick filter."
              call: "nyt-movie-reviews.get-movie-reviews"
              with:
                type: "rest.type"
                offset: "rest.offset"
                order: "rest.order"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/movie-reviews/search
          name: movie-reviews-search
          description: "Search NYT movie reviews."
          operations:
            - method: GET
              name: search-movie-reviews
              description: "Search NYT movie reviews by keyword or reviewer."
              call: "nyt-movie-reviews.search-movie-reviews"
              with:
                query: "rest.query"
                reviewer: "rest.reviewer"
                critics-pick: "rest.critics-pick"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9124
      namespace: nyt-movie-reviews-mcp
      transport: http
      tools:
        - name: get-movie-critics
          description: "Get NYT movie critic profiles including biography and image."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-movie-reviews.get-movie-critics"
          with:
            reviewer: "tools.reviewer"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-movie-reviews
          description: "Get NYT movie reviews, optionally filtered to Critics' Picks only."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-movie-reviews.get-movie-reviews"
          with:
            type: "tools.type"
            offset: "tools.offset"
            order: "tools.order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-movie-reviews
          description: "Search NYT movie reviews by keyword, date range, or reviewer name."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-movie-reviews.search-movie-reviews"
          with:
            query: "tools.query"
            reviewer: "tools.reviewer"
            critics-pick: "tools.critics-pick"
          outputParameters:
            - type: object
              mapping: "$."
