naftiko: "1.0.0-alpha1"

info:
  label: "NYT Books API"
  description: "Access NYT Best Sellers lists, book reviews, and bestseller history. Covers all NYT bestseller list categories with historical data."
  tags:
    - New York Times
    - Books
    - Best Sellers
    - Reviews
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      NYT_API_KEY: NYT_API_KEY

capability:
  consumes:
    - type: http
      namespace: nyt-books
      baseUri: https://api.nytimes.com/svc/books/v3
      description: "NYT Books API providing best seller lists and book review information."
      authentication:
        type: apikey
        key: api-key
        value: "{{NYT_API_KEY}}"
        placement: query
      resources:
        - name: best-seller-lists
          path: /lists.json
          description: "Get current NYT Best Sellers lists by list name."
          operations:
            - name: get-best-seller-list
              method: GET
              description: "Get best sellers for a specific list with optional filters."
              inputParameters:
                - name: list
                  in: query
                  type: string
                  required: false
                  description: "Name of the best-seller list (e.g., hardcover-fiction)."
                - name: bestsellers-date
                  in: query
                  type: string
                  required: false
                  description: "YYYY-MM-DD week-ending date for the best seller sales data."
                - name: published-date
                  in: query
                  type: string
                  required: false
                  description: "YYYY-MM-DD date the best-seller list was published."
                - name: isbn
                  in: query
                  type: string
                  required: false
                  description: "ISBN (10 or 13 digits)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: best-seller-history
          path: /lists/best-sellers/history.json
          description: "Get historical best seller data searchable by title, author, ISBN."
          operations:
            - name: get-best-seller-history
              method: GET
              description: "Search the full history of NYT Best Sellers lists."
              inputParameters:
                - name: author
                  in: query
                  type: string
                  required: false
                  description: "The author of the best seller."
                - name: title
                  in: query
                  type: string
                  required: false
                  description: "The title of the best seller."
                - name: isbn
                  in: query
                  type: string
                  required: false
                  description: "ISBN (10 or 13 digits)."
                - name: publisher
                  in: query
                  type: string
                  required: false
                  description: "The standardized name of the publisher."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: list-names
          path: /lists/names.json
          description: "Get all available NYT Best Sellers list names."
          operations:
            - name: get-best-seller-list-names
              method: GET
              description: "Get a list of all Best Sellers list names with encoded names for API requests."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: list-overview
          path: /lists/overview.json
          description: "Get an overview of all best seller lists for a given week."
          operations:
            - name: get-best-seller-list-overview
              method: GET
              description: "Get a weekly overview of all NYT Best Sellers lists."
              inputParameters:
                - name: published_date
                  in: query
                  type: string
                  required: false
                  description: "YYYY-MM-DD date for the best-seller list publication."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reviews
          path: /reviews.json
          description: "Get NYT book reviews."
          operations:
            - name: get-book-reviews
              method: GET
              description: "Get NYT book reviews by title, author, or ISBN."
              inputParameters:
                - name: isbn
                  in: query
                  type: integer
                  required: false
                  description: "ISBN of the book."
                - name: title
                  in: query
                  type: string
                  required: false
                  description: "Title of the book."
                - name: author
                  in: query
                  type: string
                  required: false
                  description: "Author of the book."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8122
      namespace: nyt-books-api
      resources:
        - path: /v1/best-sellers
          name: best-sellers
          description: "NYT Best Sellers lists."
          operations:
            - method: GET
              name: get-best-seller-list
              description: "Get current NYT Best Sellers list."
              call: "nyt-books.get-best-seller-list"
              with:
                list: "rest.list"
                bestsellers-date: "rest.bestsellers-date"
                published-date: "rest.published-date"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/best-sellers/history
          name: best-seller-history
          description: "Historical NYT Best Sellers data."
          operations:
            - method: GET
              name: get-best-seller-history
              description: "Search historical NYT Best Sellers data."
              call: "nyt-books.get-best-seller-history"
              with:
                author: "rest.author"
                title: "rest.title"
                isbn: "rest.isbn"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/best-sellers/list-names
          name: list-names
          description: "All NYT Best Sellers list names."
          operations:
            - method: GET
              name: get-best-seller-list-names
              description: "Get all available Best Sellers list names."
              call: "nyt-books.get-best-seller-list-names"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/book-reviews
          name: reviews
          description: "NYT book reviews."
          operations:
            - method: GET
              name: get-book-reviews
              description: "Get NYT book reviews by title, author, or ISBN."
              call: "nyt-books.get-book-reviews"
              with:
                isbn: "rest.isbn"
                title: "rest.title"
                author: "rest.author"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9122
      namespace: nyt-books-mcp
      transport: http
      tools:
        - name: get-best-seller-list
          description: "Get current NYT Best Sellers list for a specific category."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-books.get-best-seller-list"
          with:
            list: "tools.list"
            bestsellers-date: "tools.bestsellers-date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-best-seller-history
          description: "Search the full history of NYT Best Sellers by author, title, or ISBN."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-books.get-best-seller-history"
          with:
            author: "tools.author"
            title: "tools.title"
            isbn: "tools.isbn"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-best-seller-list-names
          description: "Get all available NYT Best Sellers list names."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-books.get-best-seller-list-names"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-book-reviews
          description: "Get NYT book reviews by book title, author name, or ISBN."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-books.get-book-reviews"
          with:
            isbn: "tools.isbn"
            title: "tools.title"
            author: "tools.author"
          outputParameters:
            - type: object
              mapping: "$."
