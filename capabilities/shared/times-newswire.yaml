naftiko: "1.0.0-alpha1"

info:
  label: "NYT Times Newswire API"
  description: "Get links and metadata for NYT articles as soon as they are published. Provides an up-to-the-minute stream of published articles by section and source."
  tags:
    - New York Times
    - Newswire
    - Articles
    - Streaming
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      NYT_API_KEY: NYT_API_KEY

capability:
  consumes:
    - type: http
      namespace: nyt-newswire
      baseUri: https://api.nytimes.com/svc/news/v3
      description: "NYT Times Newswire API delivering real-time article metadata as articles are published."
      authentication:
        type: apikey
        key: api-key
        value: "{{NYT_API_KEY}}"
        placement: query
      resources:
        - name: content
          path: /content/{source}/{section}.json
          description: "Get recent content from a specific source and section."
          operations:
            - name: get-newswire-content
              method: GET
              description: "Get recently published NYT articles by source and section."
              inputParameters:
                - name: source
                  in: path
                  type: string
                  required: true
                  description: "Content source: all, nyt, or iht."
                - name: section
                  in: path
                  type: string
                  required: true
                  description: "Section name or 'all' for all sections."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to return (max 20, default 20)."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Starting record number (default 0)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8127
      namespace: nyt-newswire-api
      resources:
        - path: /v1/newswire/{source}/{section}
          name: newswire-content
          description: "Real-time NYT article stream by source and section."
          operations:
            - method: GET
              name: get-newswire-content
              description: "Get recently published NYT articles."
              call: "nyt-newswire.get-newswire-content"
              with:
                source: "rest.source"
                section: "rest.section"
                limit: "rest.limit"
                offset: "rest.offset"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9127
      namespace: nyt-newswire-mcp
      transport: http
      tools:
        - name: get-newswire-content
          description: "Get recently published NYT articles by source and section in real-time."
          hints:
            readOnly: true
            idempotent: true
          call: "nyt-newswire.get-newswire-content"
          with:
            source: "tools.source"
            section: "tools.section"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
