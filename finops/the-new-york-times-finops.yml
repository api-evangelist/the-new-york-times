description: >-
  FOCUS-aligned FinOps scaffold for The New York Times Developer Network. The public APIs are free for
  non-commercial use under a developer key, so there is no FOCUS-billable usage line for general developers;
  any commercial / syndication use is invoiced under a separate negotiated agreement with The New York
  Times.
sources:
  - https://developer.nytimes.com/
  - https://focus.finops.org/focus-specification/v1-3/
notes: >-
  Free non-commercial use means no FOCUS Usage line items. Commercial agreements are invoiced separately
  by The New York Times Company and are not described publicly.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
