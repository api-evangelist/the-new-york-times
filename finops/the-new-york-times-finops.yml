billingModel:
  pricingCategory: Free (Non-Commercial)
  billingFrequency: On-Demand
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: NYT Developer Network
  ServiceCategory: News / Media
  ProviderName: The New York Times
  PublisherName: The New York Times Company
  InvoiceIssuerName: The New York Times Company
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - app_id
principles:
  - name: Visibility
    description: Per-app usage is visible inside the NYT Developer Network portal; no programmatic FOCUS-grade
      cost export exists for the free tier.
  - name: Allocation
    description: Allocate usage by registered NYT app per consuming product / team so quota headroom is
      tracked even though there is no monetary charge.
  - name: Optimization
    description: Cache responses, prefer Top Stories or Times Wire over Article Search where possible to
      stay within per-app quotas, and consolidate apps to reduce key sprawl.
  - name: Accountability
    description: App owner inside the consuming organization is accountable for staying within the developer
      key's quota and for upgrading to a commercial agreement when use crosses the non-commercial line.
