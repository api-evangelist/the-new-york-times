specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: The New York Times
providerId: the-new-york-times
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Articles
  - Books
  - Movies
  - News
  - Media
  - Publishing
  - Journalism
description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: the-new-york-times-free
    name: Free
    type: freemium
    description: Free entry tier for the The New York Times API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://api.nytimes.com/svc/archive/v1
          - https://api.nytimes.com/svc/search/v2
          - https://api.nytimes.com/svc/books/v3
          - https://api.nytimes.com/svc/mostpopular/v2
          - https://api.nytimes.com/svc/movies/v2
          - https://api.nytimes.com/svc/semantic/v2
          - https://api.nytimes.com/svc/suggest/v1
          - https://api.nytimes.com/svc/news/v3
          - https://api.nytimes.com/svc/topstories/v2
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.nytimes.com/svc/archive/v1
          - https://api.nytimes.com/svc/search/v2
          - https://api.nytimes.com/svc/books/v3
          - https://api.nytimes.com/svc/mostpopular/v2
          - https://api.nytimes.com/svc/movies/v2
          - https://api.nytimes.com/svc/semantic/v2
          - https://api.nytimes.com/svc/suggest/v1
          - https://api.nytimes.com/svc/news/v3
          - https://api.nytimes.com/svc/topstories/v2
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: The New York Times Archive API
      - name: The New York Times Article Search API
      - name: The New York Times Books API
      - name: The New York Times Most Popular API
      - name: The New York Times Movie Reviews API
      - name: The New York Times Semantic API
      - name: The New York Times TimesTags API
      - name: The New York Times Times Newswire API
  - id: the-new-york-times-pro
    name: Professional
    type: paid
    description: Production tier for The New York Times. Provides higher quotas, priority support, and
      access to the broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://api.nytimes.com/svc/archive/v1
          - https://api.nytimes.com/svc/search/v2
          - https://api.nytimes.com/svc/books/v3
          - https://api.nytimes.com/svc/mostpopular/v2
          - https://api.nytimes.com/svc/movies/v2
          - https://api.nytimes.com/svc/semantic/v2
          - https://api.nytimes.com/svc/suggest/v1
          - https://api.nytimes.com/svc/news/v3
          - https://api.nytimes.com/svc/topstories/v2
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://api.nytimes.com/svc/archive/v1
          - https://api.nytimes.com/svc/search/v2
          - https://api.nytimes.com/svc/books/v3
          - https://api.nytimes.com/svc/mostpopular/v2
