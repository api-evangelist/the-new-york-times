  - id: the-new-york-times-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for The New York Times. Includes dedicated capacity, contractual
      SLAs, security review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://api.nytimes.com/svc/archive/v1
