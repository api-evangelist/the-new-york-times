specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: The New York Times
providerId: the-new-york-times
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - News
  - Articles
  - Books
  - Movies
  - Media
description: >-
  The New York Times Developer Network exposes a free public set of APIs (Article Search, Top Stories,
  Most Popular, Books, Movies, Archive, Times Wire, Semantic, Geo) for non-commercial use, behind a registered
  app key. Commercial / redistribution use requires a separate agreement with The New York Times. The
  developer.nytimes.com docs were not reachable from this environment at reconciliation time, so concrete
  current quotas are not transcribed here.
sources:
  - https://developer.nytimes.com/
notes: >-
  developer.nytimes.com / nytimes.com were blocked at reconciliation time; quotas and the latest acceptable-use
  terms must be re-verified against the live FAQ before any consumer relies on this artifact.
plans:
  - id: the-new-york-times-developer-free
    name: Developer (Free, Non-Commercial)
    type: freemium
    description: Free developer tier with registered app key for non-commercial use of the public NYT APIs.
    entries:
      - label: Public API Access
        name: public_api_access
        type: quota
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Article Search API
      - name: Top Stories API
      - name: Most Popular API
      - name: Books API
      - name: Movie Reviews API
      - name: Archive API
      - name: Times Wire API
      - name: Semantic API
      - name: TimesTags API
  - id: the-new-york-times-commercial
    name: Commercial / Redistribution
    type: enterprise
    description: Commercial, redistribution, or syndication use requires a separate agreement with The
      New York Times.
    entries:
      - label: Commercial License
        name: commercial_license
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact The New York Times
        userMultiplied: false
    elements:
      - name: Negotiated Commercial Terms
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
